<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivan | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <nav>
        <div class="logo">Vivan<span>.</span></div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <h1>Hi, I'm <span class="highlight">Vivan</span></h1>
        <p>Student & Aspiring Developer</p>
        <a href="https://github.com/vivan0788" target="_blank" class="btn">View My GitHub</a>
    </section>

    <section id="projects">
        <h2>My Projects</h2>
        <div class="project-grid" id="project-container">
            <p>Loading projects...</p>
        </div>
    </section>

    <section id="contact">
        <h2>Get In Touch</h2>
        <form action="https://formspree.io/f/mwvyrzye" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="_replyto" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Vivan | Built with ❤️</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
